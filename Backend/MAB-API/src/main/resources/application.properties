spring.application.name=mab-api
# ?? Server ??????????????????????????????????????????????
server.port=8080

# ?? Database ?????????????????????????????????????????????
spring.datasource.url=jdbc:postgresql://localhost:5432/myaccounting_dev
spring.datasource.username=mab_app
spring.datasource.password=A2sQcLf.p4t_KdBa
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ?? Security ??????????????????????????????????????????????
jwt.secret=change_me_in_production_use_a_256_bit_key
jwt.expiration-ms=86400000

# ?? Logging ???????????????????????????????????????????????
logging.level.com.yourname.mab=DEBUG
logging.level.org.springframework.jdbc.core=DEBUG

# ?? OpenAPI / Swagger UI ??????????????????????????????????????????????????????
# Path for the Swagger UI browser interface
springdoc.swagger-ui.path=/swagger-ui.html

# Path for the raw OpenAPI JSON spec
springdoc.api-docs.path=/v3/api-docs

# Sort endpoints alphabetically in the UI
springdoc.swagger-ui.operationsSorter=alpha

# Show the "Authorize" button ? needed for JWT Bearer input
springdoc.swagger-ui.persistAuthorization=true

# Disable the default /v3/api-docs.yaml endpoint (JSON only)
springdoc.api-docs.enabled=true